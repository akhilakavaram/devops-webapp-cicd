name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: devops-webapp-cicd:${{ github.sha }}

  compose-smoke-test:
    name: Docker Compose smoke test
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start app
        run: docker compose up -d --build

      - name: Check health endpoint
        run: |
          for attempt in {1..10}; do
            if curl --fail http://localhost:8000/health; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs
          exit 1

      - name: Stop app
        if: always()
        run: docker compose down
